{% extends "base.html" %}
{% block content %}
<div class="auth-shell">
  <section class="page-header">
    <h2>ログイン</h2>
    <p>登録済みユーザーとしてタスク管理画面に入ります。</p>
  </section>

  <form method="post" class="auth-stack">
    <div class="form-field">
      <label>メールアドレス</label>
      <input name="email" type="email" required>
    </div>
    <div class="form-field">
      <label>パスワード</label>
      <input name="password" type="password" required>
    </div>
    <div class="form-actions">
      <button type="submit">ログイン</button>
    </div>
  </form>

  <p class="muted-link">
    <a href="{{ url_for('register') }}">ユーザー登録はこちら</a>
  </p>
</div>
{% endblock %}
